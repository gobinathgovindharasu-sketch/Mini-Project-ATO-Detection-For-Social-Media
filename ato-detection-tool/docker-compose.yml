version: "3.9"

services:
  # ---------- PostgreSQL ----------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ato_detection
      POSTGRES_USER: ato_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ato_secret_2025}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ato_user -d ato_detection"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------- FastAPI Backend ----------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://ato_user:${POSTGRES_PASSWORD:-ato_secret_2025}@postgres:5432/ato_detection
      SECRET_KEY: ${SECRET_KEY:-super-secret-change-in-production}
      FERNET_KEY: ${FERNET_KEY:-ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg=}
      CORS_ORIGINS: http://localhost:3000,http://frontend:3000
      WEBHOOK_URL: ${WEBHOOK_URL:-}
      RISK_THRESHOLD: "0.8"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ---------- Next.js Frontend ----------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
